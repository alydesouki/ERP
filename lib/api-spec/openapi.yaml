          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteWarehouse
      tags: [warehouses]
      summary: Deactivate a warehouse
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deactivated
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /inventory/stock:
    get:
      operationId: listStock
      tags: [inventory]
      summary: Current stock per variant per warehouse
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: search
          in: query
          schema: { type: string }
        - name: warehouseId
          in: query
          schema: { type: string, format: uuid }
        - name: lowStockOnly
          in: query
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Paginated stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockList"

  /inventory/movements:
    get:
      operationId: listMovements
      tags: [inventory]
      summary: Inventory movement history
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: variantId
          in: query
          schema: { type: string, format: uuid }
        - name: warehouseId
          in: query
          schema: { type: string, format: uuid }
        - name: type
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated movements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovementList"

  /inventory/adjustments:
    post:
      operationId: createAdjustment
      tags: [inventory]
      summary: Manually adjust stock (creates movements + syncs quantities)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustmentInput"
      responses:
        "201":
          description: Movements created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryMovement"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SetupStatus:
      type: object
      properties:
        storeExists:
          type: boolean
        isSetupComplete:
          type: boolean
      required:
        - storeExists
        - isSetupComplete

    SetupInput:
      type: object
      required:
        - storeName
        - printerWidth
        - adminFullName
        - adminUsername
        - adminPassword
      properties:
        storeName:
          type: string
          minLength: 1
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        currency:
          type: string
          default: EGP
        taxRate:
          type: number
          minimum: 0
          maximum: 100
          default: 0
        logoUrl:
          type: string
        printerWidth:
          type: string
          enum: ["58mm", "80mm"]
        paperType:
          type: string
        adminFullName:
          type: string
          minLength: 1
        adminUsername:
          type: string
          minLength: 3
        adminPassword:
          type: string
          minLength: 8

    SetupResult:
      type: object
      properties:
        storeId:
          type: string
          format: uuid
        message:
          type: string
      required:
        - storeId
        - message

    LoginInput:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    RoleRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        nameAr:
          type: ["string", "null"]
      required:
        - id
        - name

    CurrentUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        storeId:
          type: string
          format: uuid
        username:
          type: string
        fullName:
          type: string
        role:
          $ref: "#/components/schemas/RoleRef"
        permissions:
          type: array
          items:
            type: string
        storeName:
          type: string
      required:
        - id
        - storeId
        - username
        - fullName
        - role
        - permissions
        - storeName

    AuthResult:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/CurrentUser"
      required:
        - accessToken
        - user

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        fullName:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        isActive:
          type: boolean
        roleId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/RoleRef"
        lastLoginAt:
          type: ["string", "null"]
          format: date-time
        lockedUntil:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - fullName
        - isActive
        - roleId
        - role
        - createdAt

    UserInput:
      type: object
      required:
        - username
        - password
        - fullName
        - roleId
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 8
        fullName:
          type: string
          minLength: 1
        roleId:
          type: string
          format: uuid
        phone:
          type: string
        email:
          type: string
        isActive:
          type: boolean
          default: true

    UserUpdate:
      type: object
      properties:
        fullName:
          type: string
          minLength: 1
        roleId:
          type: string
          format: uuid
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        isActive:
          type: boolean

    PasswordResetInput:
      type: object
      required:
        - newPassword
      properties:
        newPassword:
          type: string
          minLength: 8

    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        permissions:
          type: array
          items:
            type: string
        isSystem:
          type: boolean
        userCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - permissions
        - isSystem
        - userCount
        - createdAt

    RoleInput:
      type: object
      required:
        - name
        - permissions
      properties:
        name:
          type: string
          minLength: 1
        nameAr:
          type: string
        permissions:
          type: array
          items:
            type: string

    RoleUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        nameAr:
          type: string
        permissions:
          type: array
          items:
            type: string

    PermissionDef:
      type: object
      properties:
        key:
          type: string
        labelAr:
          type: string
      required:
        - key
        - labelAr

    PermissionGroup:
      type: object
      properties:
        module:
          type: string
        labelAr:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionDef"
      required:
        - module
        - labelAr
        - permissions

    UserList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - items
        - total
        - page
        - pageSize

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
        entityType:
          type: ["string", "null"]
        entityId:
          type: ["string", "null"]
        userId:
          type: ["string", "null"]
          format: uuid
        userName:
          type: ["string", "null"]
        ipAddress:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - action
        - createdAt

    AuditLogList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - items
        - total
        - page
        - pageSize

    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        nameEn: { type: ["string", "null"] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, name, isActive, createdAt]

    CategoryInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        nameEn: { type: ["string", "null"] }
        isActive: { type: boolean }

    Brand:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        nameEn: { type: ["string", "null"] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, name, isActive, createdAt]

    BrandInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        nameEn: { type: ["string", "null"] }
        isActive: { type: boolean }

    Color:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        nameEn: { type: ["string", "null"] }
        hex: { type: ["string", "null"] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, name, isActive, createdAt]

    ColorInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        nameEn: { type: ["string", "null"] }
        hex: { type: ["string", "null"] }
        isActive: { type: boolean }

    Size:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        system: { type: string }
        sortOrder: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, name, system, sortOrder, isActive, createdAt]

    SizeInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        system: { type: string }
        sortOrder: { type: integer }
        isActive: { type: boolean }

    ProductVariant:
      type: object
      properties:
        id: { type: string, format: uuid }
        productId: { type: string, format: uuid }
        colorId: { type: string, format: uuid }
        sizeId: { type: string, format: uuid }
        colorName: { type: ["string", "null"] }
        sizeName: { type: ["string", "null"] }
        sku: { type: string }
        barcode: { type: string }
        sellingPrice: { type: ["string", "null"] }
        costPrice: { type: ["string", "null"] }
        totalStock: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, productId, colorId, sizeId, sku, barcode, isActive, createdAt]

    VariantInput:
      type: object
      required: [colorId, sizeId]
      properties:
        colorId: { type: string, format: uuid }
        sizeId: { type: string, format: uuid }
        sku: { type: string }
        barcode: { type: string }
        sellingPrice: { type: ["number", "null"] }
        costPrice: { type: ["number", "null"] }

    VariantUpdate:
      type: object
      properties:
        sellingPrice: { type: ["number", "null"] }
        costPrice: { type: ["number", "null"] }
        isActive: { type: boolean }

    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        nameEn: { type: ["string", "null"] }
        categoryId: { type: string, format: uuid }
        categoryName: { type: ["string", "null"] }
        brandId: { type: ["string", "null"], format: uuid }
        brandName: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        basePrice: { type: string }
        baseCostPrice: { type: string }
        reorderPoint: { type: integer }
        barcode: { type: ["string", "null"] }
        variantCount: { type: integer }
        totalStock: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, name, categoryId, basePrice, baseCostPrice, reorderPoint, isActive, createdAt]

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            variants:
              type: array
              items:
                $ref: "#/components/schemas/ProductVariant"
          required: [variants]

    VariantSeed:
      type: object
      required: [colorId, sizeId]
      properties:
        colorId: { type: string, format: uuid }
        sizeId: { type: string, format: uuid }
        sellingPrice: { type: ["number", "null"] }
        costPrice: { type: ["number", "null"] }

    ProductInput:
      type: object
      required: [name, categoryId]
      properties:
        name: { type: string, minLength: 1 }
        nameEn: { type: ["string", "null"] }
        categoryId: { type: string, format: uuid }
        brandId: { type: ["string", "null"], format: uuid }
        description: { type: ["string", "null"] }
        basePrice: { type: number, minimum: 0 }
        baseCostPrice: { type: number, minimum: 0 }
        reorderPoint: { type: integer, minimum: 0 }
        variants:
          type: array
          items:
            $ref: "#/components/schemas/VariantSeed"

    ProductUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        nameEn: { type: ["string", "null"] }
        categoryId: { type: string, format: uuid }
        brandId: { type: ["string", "null"], format: uuid }
        description: { type: ["string", "null"] }
        basePrice: { type: number, minimum: 0 }
        baseCostPrice: { type: number, minimum: 0 }
        reorderPoint: { type: integer, minimum: 0 }
        isActive: { type: boolean }

    ProductList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
      required: [items, total, page, pageSize]

    Warehouse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        code: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        isDefault: { type: boolean }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, name, isDefault, isActive, createdAt]

    WarehouseInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        code: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        isDefault: { type: boolean }
        isActive: { type: boolean }

    StockItem:
      type: object
      properties:
        variantId: { type: string, format: uuid }
        productId: { type: string, format: uuid }
        productName: { type: string }
        sku: { type: string }
        barcode: { type: string }
        colorName: { type: ["string", "null"] }
        sizeName: { type: ["string", "null"] }
        warehouseId: { type: string, format: uuid }
        warehouseName: { type: string }
        quantity: { type: integer }
        reorderPoint: { type: integer }
      required: [variantId, productId, productName, sku, barcode, warehouseId, warehouseName, quantity, reorderPoint]

    StockList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/StockItem"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
      required: [items, total, page, pageSize]

    InventoryMovement:
      type: object
      properties:
        id: { type: string, format: uuid }
        variantId: { type: string, format: uuid }
        sku: { type: ["string", "null"] }
        productName: { type: ["string", "null"] }
        warehouseId: { type: string, format: uuid }
        warehouseName: { type: ["string", "null"] }
        type: { type: string }
        quantityChange: { type: integer }
        balanceAfter: { type: integer }
        referenceType: { type: ["string", "null"] }
        referenceId: { type: ["string", "null"], format: uuid }
        notes: { type: ["string", "null"] }
        userName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, variantId, warehouseId, type, quantityChange, balanceAfter, createdAt]

    MovementList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/InventoryMovement"
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
      required: [items, total, page, pageSize]

    AdjustmentLine:
      type: object
      required: [variantId, type, quantity]
      properties:
        variantId: { type: string, format: uuid }
        type: { type: string, enum: [ADJUSTMENT_IN, ADJUSTMENT_OUT] }
        quantity: { type: integer, minimum: 1 }
        notes: { type: ["string", "null"] }

    AdjustmentInput:
      type: object
      required: [warehouseId, lines]
      properties:
        warehouseId: { type: string, format: uuid }
        notes: { type: ["string", "null"] }
        lines:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/AdjustmentLine"
