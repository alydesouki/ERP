components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SetupStatus:
      type: object
      properties:
        storeExists:
          type: boolean
        isSetupComplete:
          type: boolean
      required:
        - storeExists
        - isSetupComplete

    SetupInput:
      type: object
      required:
        - storeName
        - printerWidth
        - adminFullName
        - adminUsername
        - adminPassword
      properties:
        storeName:
          type: string
          minLength: 1
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        currency:
          type: string
          default: EGP
        taxRate:
          type: number
          minimum: 0
          maximum: 100
          default: 0
        logoUrl:
          type: string
        printerWidth:
          type: string
          enum: ["58mm", "80mm"]
        paperType:
          type: string
        adminFullName:
          type: string
          minLength: 1
        adminUsername:
          type: string
          minLength: 3
        adminPassword:
          type: string
          minLength: 8

    SetupResult:
      type: object
      properties:
        storeId:
          type: string
          format: uuid
        message:
          type: string
      required:
        - storeId
        - message

    LoginInput:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    RoleRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        nameAr:
          type: ["string", "null"]
      required:
        - id
        - name

    CurrentUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        storeId:
          type: string
          format: uuid
        username:
          type: string
        fullName:
          type: string
        role:
          $ref: "#/components/schemas/RoleRef"
        permissions:
          type: array
          items:
            type: string
        storeName:
          type: string
      required:
        - id
        - storeId
        - username
        - fullName
        - role
        - permissions
        - storeName

    AuthResult:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/CurrentUser"
      required:
        - accessToken
        - user

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        fullName:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        isActive:
          type: boolean
        roleId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/RoleRef"
        lastLoginAt:
          type: ["string", "null"]
          format: date-time
        lockedUntil:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - fullName
        - isActive
        - roleId
        - role
        - createdAt

    UserInput:
      type: object
      required:
        - username
        - password
        - fullName
        - roleId
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 8
        fullName:
          type: string
          minLength: 1
        roleId:
          type: string
          format: uuid
        phone:
          type: string
        email:
          type: string
        isActive:
          type: boolean
          default: true

    UserUpdate:
      type: object
      properties:
        fullName:
          type: string
          minLength: 1
        roleId:
          type: string
          format: uuid
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        isActive:
          type: boolean

    PasswordResetInput:
      type: object
      required:
        - newPassword
      properties:
        newPassword:
          type: string
          minLength: 8

    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        permissions:
          type: array
          items:
            type: string
        isSystem:
          type: boolean
        userCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - permissions
        - isSystem
        - userCount
        - createdAt

    RoleInput:
      type: object
      required:
        - name
        - permissions
      properties:
        name:
          type: string
          minLength: 1
        nameAr:
          type: string
        permissions:
          type: array
          items:
            type: string

    RoleUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        nameAr:
          type: string
        permissions:
          type: array
          items:
            type: string

    PermissionDef:
      type: object
      properties:
        key:
          type: string
        labelAr:
          type: string
      required:
        - key
        - labelAr

    PermissionGroup:
      type: object
      properties:
        module:
          type: string
        labelAr:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionDef"
      required:
        - module
        - labelAr
        - permissions

    UserList:
      type: object
      properties:
        items:
