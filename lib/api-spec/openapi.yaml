components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SetupStatus:
      type: object
      properties:
        storeExists:
          type: boolean
        isSetupComplete:
          type: boolean
      required:
        - storeExists
        - isSetupComplete

    SetupInput:
      type: object
      required:
        - storeName
        - printerWidth
        - adminFullName
        - adminUsername
        - adminPassword
      properties:
        storeName:
          type: string
          minLength: 1
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        currency:
          type: string
          default: EGP
        taxRate:
          type: number
          minimum: 0
          maximum: 100
          default: 0
        logoUrl:
          type: string
        printerWidth:
          type: string
          enum: ["58mm", "80mm"]
        paperType:
          type: string
        adminFullName:
          type: string
          minLength: 1
        adminUsername:
          type: string
          minLength: 3
        adminPassword:
          type: string
          minLength: 8

    SetupResult:
      type: object
      properties:
        storeId:
          type: string
          format: uuid
        message:
          type: string
      required:
        - storeId
        - message

    LoginInput:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 4
    UserSearchResult:
      type: object
      required:
        - id
        - username
        - fullName
